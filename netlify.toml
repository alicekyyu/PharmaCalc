# Netlify continuous deployment config.
# With the repo connected to Netlify, every push runs this build automatically.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Missing hashed assets must 404 cleanly, NOT fall through to the SPA fallback.
# Otherwise a stale index.html requesting a deleted bundle gets served index.html
# (text/html), causing a "MIME type" error and a blank screen. force=false means
# this only fires when no real file matches, so live assets are unaffected.
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 404

# Single-page app fallback: serve index.html for any other path so client routes
# (and hard refreshes) don't 404. Harmless for the current single-view app.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
